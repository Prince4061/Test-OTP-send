<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>n8n Route Controller</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --bg-secondary: #1e1b4b;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            background: linear-gradient(135deg, var(--bg), var(--bg-secondary));
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            height: 100vh;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .circle {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(59, 130, 246, 0.15);
            filter: blur(80px);
            z-index: 0;
        }

        .circle-1 {
            top: -100px;
            left: -100px;
        }

        .circle-2 {
            bottom: -100px;
            right: -100px;
            background: rgba(139, 92, 246, 0.15);
        }

        .container {
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            text-align: center;
            transition: border-color 0.4s ease;
        }

        .card.system-off {
            border-color: rgba(239, 68, 68, 0.4);
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 8px;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-bottom: 24px;
        }

        /* ===== MASTER TOGGLE SWITCH ===== */
        .master-toggle-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-bottom: 28px;
            padding: 16px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        .master-toggle-wrapper.on {
            background: rgba(16, 185, 129, 0.08);
            border-color: rgba(16, 185, 129, 0.3);
        }

        .master-toggle-wrapper.off {
            background: rgba(239, 68, 68, 0.08);
            border-color: rgba(239, 68, 68, 0.3);
        }

        .toggle-label {
            font-size: 0.95rem;
            font-weight: 600;
            color: #94a3b8;
            min-width: 80px;
            text-align: right;
        }

        .toggle-label.active-label {
            color: var(--success);
        }

        .toggle-label.inactive-label {
            color: var(--danger);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 32px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ef4444;
            border-radius: 32px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.4);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 24px;
            width: 24px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            border-radius: 50%;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:checked+.slider {
            background-color: var(--success);
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.5);
        }

        input:checked+.slider:before {
            transform: translateX(28px);
        }

        .toggle-status-text {
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            min-width: 40px;
            text-align: left;
        }

        /* ===== GROUP BUTTONS ===== */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: opacity 0.3s ease;
        }

        .btn-group.disabled {
            opacity: 0.35;
            pointer-events: none;
            filter: grayscale(0.5);
        }

        .group-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: #e2e8f0;
            padding: 18px 24px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .group-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .group-btn.active {
            background: rgba(59, 130, 246, 0.15);
            border-color: var(--accent);
            color: white;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3), inset 0 0 0 1px var(--accent);
        }

        .group-btn .indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #475569;
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        .group-btn.active .indicator {
            background: var(--success);
            box-shadow: 0 0 10px var(--success);
        }

        .status {
            margin-top: 28px;
            font-size: 0.85rem;
            color: #94a3b8;
            min-height: 20px;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>

    <div class="container">
        <div class="card {% if not system_active %}system-off{% endif %}" id="mainCard">
            <h1>n8n Switchboard</h1>
            <p class="subtitle">Control OTP forwarding routing.</p>

            <!-- MASTER ON/OFF TOGGLE -->
            <div class="master-toggle-wrapper {% if system_active %}on{% else %}off{% endif %}" id="toggleWrapper">
                <span class="toggle-label {% if not system_active %}inactive-label{% endif %}" id="offLabel">OFF</span>
                <label class="switch" title="Toggle system ON or OFF">
                    <input type="checkbox" id="masterToggle" {% if system_active %}checked{% endif %}
                        onchange="toggleSystem(this)">
                    <span class="slider"></span>
                </label>
                <span class="toggle-label {% if system_active %}active-label{% endif %}" id="onLabel">ON</span>
            </div>

            <!-- GROUP SELECTION BUTTONS -->
            <div class="btn-group {% if not system_active %}disabled{% endif %}" id="btnGroup">
                <button class="group-btn {% if active_group == 'group_1' %}active{% endif %}" id="btn-group_1"
                    onclick="setGroup('group_1', this)">
                    <div class="indicator"></div> Group 1
                </button>
                <button class="group-btn {% if active_group == 'group_2' %}active{% endif %}" id="btn-group_2"
                    onclick="setGroup('group_2', this)">
                    <div class="indicator"></div> Group 2
                </button>
                <button class="group-btn {% if active_group == 'group_3' %}active{% endif %}" id="btn-group_3"
                    onclick="setGroup('group_3', this)">
                    <div class="indicator"></div> Group 3
                </button>
                <button class="group-btn {% if active_group == 'group_4' %}active{% endif %}" id="btn-group_4"
                    onclick="setGroup('group_4', this)">
                    <div class="indicator"></div> Group 4
                </button>
                <button class="group-btn {% if active_group == 'group_5' %}active{% endif %}" id="btn-group_5"
                    onclick="setGroup('group_5', this)">
                    <div class="indicator"></div> Group 5
                </button>
            </div>

            <div class="status" id="statusMsg"></div>
        </div>
    </div>

    <script>
        function updateUI(isActive) {
            const wrapper = document.getElementById('toggleWrapper');
            const card = document.getElementById('mainCard');
            const btnGroup = document.getElementById('btnGroup');
            const offLabel = document.getElementById('offLabel');
            const onLabel = document.getElementById('onLabel');

            if (isActive) {
                wrapper.classList.remove('off');
                wrapper.classList.add('on');
                card.classList.remove('system-off');
                btnGroup.classList.remove('disabled');
                offLabel.classList.remove('inactive-label');
                onLabel.classList.add('active-label');
            } else {
                wrapper.classList.remove('on');
                wrapper.classList.add('off');
                card.classList.add('system-off');
                btnGroup.classList.add('disabled');
                onLabel.classList.remove('active-label');
                offLabel.classList.add('inactive-label');
            }
        }

        function toggleSystem(checkbox) {
            const isActive = checkbox.checked;
            const statusMsg = document.getElementById('statusMsg');
            statusMsg.textContent = 'Updating...';

            fetch('/toggle', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ active: isActive })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        updateUI(isActive);
                        statusMsg.textContent = isActive ? '✅ System is now ON — OTPs will be forwarded.' : '🔴 System is OFF — OTPs will NOT be forwarded.';
                    } else {
                        statusMsg.textContent = '❌ Error toggling system.';
                        checkbox.checked = !isActive;
                    }
                })
                .catch(err => {
                    statusMsg.textContent = '❌ Network Error!';
                    checkbox.checked = !isActive;
                    console.error(err);
                });
        }

        function setGroup(groupId, btnElement) {
            document.querySelectorAll('.group-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');

            const statusMsg = document.getElementById('statusMsg');
            statusMsg.textContent = 'Updating...';

            fetch('/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ group: groupId })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        const names = { group_1: 'Group 1', group_2: 'Group 2', group_3: 'Group 3', group_4: 'Group 4', group_5: 'Group 5' };
                        statusMsg.textContent = '✅ Active Route changed to ' + names[groupId];
                    } else {
                        statusMsg.textContent = '❌ Error updating group.';
                    }
                })
                .catch(err => {
                    statusMsg.textContent = '❌ Network Error!';
                    console.error(err);
                });
        }
    </script>
</body>

</html>
